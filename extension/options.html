<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fafafa;
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .description {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    .status {
      padding: 10px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Research Log Web Clipper Settings</h1>

  <div class="form-group">
    <label for="downloadFolder">Download Folder</label>
    <input type="text" id="downloadFolder" placeholder="e.g., /Users/alice/research-log/vault/00-Inbox">
    <div class="description">
      Clipped content will be saved as markdown files in this folder. Use the full path to your vault's inbox folder.
    </div>
  </div>

  <div class="form-group">
    <label for="contributor">Contributor Name (optional)</label>
    <input type="text" id="contributor" placeholder="e.g., alice">
    <div class="description">
      If set, this name will be used in the saved files' metadata. Otherwise, system username is used.
    </div>
  </div>

  <button id="saveButton">Save Settings</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
