<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background: #fafafa;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 13px;
      color: #333;
    }
    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="checkbox"] {
      cursor: pointer;
    }
    .checkbox-group label {
      margin: 0;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .preview {
      background: white;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      max-height: 80px;
      overflow-y: auto;
      border: 1px solid #eee;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 12px;
      display: none;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <div class="form-group">
    <label>Page URL</label>
    <input type="text" id="pageUrl" readonly>
  </div>

  <div class="form-group">
    <label>Page Title</label>
    <input type="text" id="pageTitle" readonly>
  </div>

  <div class="form-group">
    <label>Selected Text</label>
    <div class="preview" id="selectedTextPreview">(none selected)</div>
  </div>

  <div class="form-group checkbox-group">
    <input type="checkbox" id="includeScreenshot">
    <label for="includeScreenshot">Include screenshot</label>
  </div>

  <div class="form-group">
    <label>Notes (optional)</label>
    <textarea id="userNotes" placeholder="Why is this important? Add any context..."></textarea>
  </div>

  <div class="form-group">
    <label>Tags (optional, comma-separated)</label>
    <input type="text" id="userTags" placeholder="e.g., research, important, reference">
  </div>

  <button id="saveButton">Save to Research Log</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
